# PetTech 智能数据助手 - 指标定义
# 共 14 个指标，分 3 个领域

metrics:
  # ============================================================
  # 硬件销售 (Hardware Sales)
  # ============================================================

  - id: gmv
    name: 销售额 (GMV)
    description: 已支付订单总额，不含退款
    domain: hardware_sales
    sql_template: |
      SELECT
        DATE(paid_at) AS date,
        channel,
        sku,
        region,
        SUM(payment_amount) AS gmv
      FROM `orders`
      WHERE status = 'paid'
        AND DATE(paid_at) BETWEEN @start_date AND @end_date
      GROUP BY date, channel, sku, region
      ORDER BY date
    dimensions:
      - channel
      - sku
      - region
    filters:
      date_range:
        required: true
      channel:
        required: false
      sku:
        required: false
      region:
        required: false
    chart_type: bar
    unit: "$"
    default_aggregation: total
    aggregations:
      - type: daily
        description: 每日销售额
      - type: total
        description: 时间范围内销售总额
      - type: average
        description: 日均销售额
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - refund_rate
      - channel_sales
      - new_users
      - active_devices
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 上个月的总销售额是多少？

  - id: order_count
    name: 订单数
    description: 已支付订单量
    domain: hardware_sales
    sql_template: |
      SELECT
        DATE(paid_at) AS date,
        channel,
        sku,
        region,
        COUNT(DISTINCT order_id) AS order_count
      FROM `orders`
      WHERE status = 'paid'
        AND DATE(paid_at) BETWEEN @start_date AND @end_date
      GROUP BY date, channel, sku, region
      ORDER BY date
    dimensions:
      - channel
      - sku
      - region
    filters:
      date_range:
        required: true
      channel:
        required: false
      sku:
        required: false
      region:
        required: false
    chart_type: bar
    unit: 单
    default_aggregation: total
    aggregations:
      - type: daily
        description: 每日订单数
      - type: total
        description: 时间范围内订单总数
      - type: average
        description: 日均订单数
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - gmv
      - avg_order_value
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 这周一共有多少订单？

  - id: avg_order_value
    name: 客单价
    description: GMV / 订单数
    domain: hardware_sales
    sql_template: |
      SELECT
        DATE(paid_at) AS date,
        channel,
        SUM(payment_amount) / NULLIF(COUNT(DISTINCT order_id), 0) AS avg_order_value
      FROM `orders`
      WHERE status = 'paid'
        AND DATE(paid_at) BETWEEN @start_date AND @end_date
      GROUP BY date, channel
      ORDER BY date
    dimensions:
      - channel
    filters:
      date_range:
        required: true
      channel:
        required: false
    chart_type: bar
    unit: "$"
    default_aggregation: average
    aggregations:
      - type: average
        description: 平均客单价
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - gmv
      - order_count
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 各渠道的客单价分别是多少？

  - id: refund_amount
    name: 退款金额
    description: 已退款订单的退款总额
    domain: hardware_sales
    sql_template: |
      SELECT
        DATE(r.refunded_at) AS date,
        o.channel,
        o.sku,
        SUM(r.refund_amount) AS refund_amount
      FROM `refunds` r
      JOIN `orders` o ON r.order_id = o.order_id
      WHERE r.status = 'completed'
        AND DATE(r.refunded_at) BETWEEN @start_date AND @end_date
      GROUP BY date, o.channel, o.sku
      ORDER BY date
    dimensions:
      - channel
      - sku
    filters:
      date_range:
        required: true
      channel:
        required: false
      sku:
        required: false
    chart_type: bar
    unit: "$"
    default_aggregation: total
    aggregations:
      - type: daily
        description: 每日退款金额
      - type: total
        description: 时间范围内退款总额
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - refund_rate
      - gmv
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 上个月退款了多少钱？

  - id: refund_rate
    name: 退款率
    description: 退款金额 / GMV
    domain: hardware_sales
    sql_template: |
      SELECT
        o.channel,
        SAFE_DIVIDE(
          SUM(r.refund_amount),
          SUM(o.payment_amount)
        ) * 100 AS refund_rate
      FROM `orders` o
      LEFT JOIN `refunds` r
        ON o.order_id = r.order_id
        AND r.status = 'completed'
      WHERE o.status = 'paid'
        AND DATE(o.paid_at) BETWEEN @start_date AND @end_date
      GROUP BY o.channel
    dimensions:
      - channel
    filters:
      date_range:
        required: true
      channel:
        required: false
    chart_type: bar
    unit: "%"
    default_aggregation: total
    aggregations:
      - type: total
        description: 时间范围内整体退款率（比率）
    anomaly_threshold:
      warning: 5
      critical: 10
    related_metrics:
      - refund_amount
      - gmv
      - channel_sales
    validations:
      - rule: value_gte
        min: 0
      - rule: ratio_range
        min: 0
        max: 100
      - rule: change_percent_range
        max_abs: 200
    example_question: 本月退款率是多少？

  - id: sku_sales
    name: 各 SKU 销量
    description: 按 SKU 拆分的销量和销售额
    domain: hardware_sales
    sql_template: |
      SELECT
        sku,
        channel,
        COUNT(DISTINCT order_id) AS units_sold,
        SUM(quantity) AS total_quantity,
        SUM(payment_amount) AS sales_amount
      FROM `orders`
      WHERE status = 'paid'
        AND DATE(paid_at) BETWEEN @start_date AND @end_date
      GROUP BY sku, channel
      ORDER BY total_quantity DESC
    dimensions:
      - sku
      - channel
    filters:
      date_range:
        required: true
      sku:
        required: false
      channel:
        required: false
    chart_type: bar
    unit: 件
    default_aggregation: total
    aggregations:
      - type: total
        description: 时间范围内各 SKU 总销量
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - gmv
      - channel_sales
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 哪个 SKU 卖得最好？

  - id: channel_sales
    name: 渠道销售额
    description: 按流量来源拆分的销售额
    domain: hardware_sales
    sql_template: |
      SELECT
        channel,
        region,
        SUM(payment_amount) AS channel_sales
      FROM `orders`
      WHERE status = 'paid'
        AND DATE(paid_at) BETWEEN @start_date AND @end_date
      GROUP BY channel, region
      ORDER BY channel_sales DESC
    dimensions:
      - channel
      - region
    filters:
      date_range:
        required: true
      channel:
        required: false
      region:
        required: false
    chart_type: bar
    unit: "$"
    default_aggregation: total
    aggregations:
      - type: total
        description: 时间范围内各渠道销售总额
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - gmv
      - refund_rate
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 各渠道的销售额占比是怎样的？

  # ============================================================
  # APP
  # ============================================================

  - id: new_users
    name: 新增注册用户数
    description: 每日/每周新注册的 APP 用户
    domain: app
    sql_template: |
      SELECT
        DATE(registered_at) AS date,
        region,
        COUNT(DISTINCT user_id) AS new_users
      FROM `app_events`
      WHERE event_type = 'registration'
        AND DATE(registered_at) BETWEEN @start_date AND @end_date
      GROUP BY date, region
      ORDER BY date
    dimensions:
      - region
    filters:
      date_range:
        required: true
      region:
        required: false
    chart_type: bar
    unit: 人
    default_aggregation: total
    aggregations:
      - type: daily
        description: 每日新增注册用户数
      - type: total
        description: 时间范围内新增注册总数
      - type: average
        description: 日均新增注册用户数
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - dau
      - device_bindings
      - gmv
      - active_devices
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 这周新增了多少用户？

  - id: dau
    name: 日活跃用户数
    description: 当天打开 APP 的独立用户数
    domain: app
    sql_template: |
      SELECT
        DATE(event_time) AS date,
        region,
        COUNT(DISTINCT user_id) AS dau
      FROM `app_events`
      WHERE event_type = 'app_open'
        AND DATE(event_time) BETWEEN @start_date AND @end_date
      GROUP BY date, region
      ORDER BY date
    dimensions:
      - region
    filters:
      date_range:
        required: true
      region:
        required: false
    chart_type: line
    unit: 人
    default_aggregation: daily
    aggregations:
      - type: daily
        description: 每日活跃用户数
      - type: average
        description: 日均活跃用户数
      - type: distinct
        description: 时间范围内去重活跃用户数
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - new_users
      - device_bindings
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 最近 7 天日活趋势怎么样？

  - id: device_bindings
    name: 设备绑定数
    description: 新绑定的设备数量
    domain: app
    sql_template: |
      SELECT
        DATE(bound_at) AS date,
        region,
        COUNT(DISTINCT device_id) AS device_bindings
      FROM `devices`
      WHERE DATE(bound_at) BETWEEN @start_date AND @end_date
      GROUP BY date, region
      ORDER BY date
    dimensions:
      - region
    filters:
      date_range:
        required: true
      region:
        required: false
    chart_type: bar
    unit: 台
    default_aggregation: total
    aggregations:
      - type: daily
        description: 每日新绑定设备数
      - type: total
        description: 时间范围内绑定设备总数
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - new_users
      - dau
      - active_devices
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 本月新绑定了多少台设备？

  - id: active_devices
    name: 活跃设备数
    description: 有数据上报的设备数量
    domain: app
    sql_template: |
      SELECT
        DATE(report_time) AS date,
        region,
        COUNT(DISTINCT device_id) AS active_devices
      FROM `devices`
      WHERE DATE(report_time) BETWEEN @start_date AND @end_date
        AND last_report_time IS NOT NULL
      GROUP BY date, region
      ORDER BY date
    dimensions:
      - region
    filters:
      date_range:
        required: true
      region:
        required: false
    chart_type: line
    unit: 台
    default_aggregation: daily
    aggregations:
      - type: daily
        description: 每日活跃设备数
      - type: average
        description: 日均活跃设备数
      - type: distinct
        description: 时间范围内去重活跃设备数
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - device_bindings
      - dau
      - gmv
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 目前有多少台设备是活跃的？

  # ============================================================
  # 耗材复购 (Consumables)
  # ============================================================

  - id: consumable_gmv
    name: 耗材销售额
    description: 耗材类 SKU 已支付订单金额，不含退款
    domain: consumables
    sql_template: |
      SELECT
        DATE(paid_at) AS date,
        sku,
        channel,
        SUM(payment_amount) AS consumable_gmv
      FROM `orders`
      WHERE status = 'paid'
        AND sku_category = 'consumable'
        AND DATE(paid_at) BETWEEN @start_date AND @end_date
      GROUP BY date, sku, channel
      ORDER BY date
    dimensions:
      - sku
      - channel
    filters:
      date_range:
        required: true
      sku:
        required: false
      channel:
        required: false
    chart_type: bar
    unit: "$"
    default_aggregation: total
    aggregations:
      - type: daily
        description: 每日耗材销售额
      - type: total
        description: 时间范围内耗材销售总额
      - type: average
        description: 日均耗材销售额
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - repurchase_rate
      - consumable_orders
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 耗材上个月卖了多少钱？

  - id: consumable_orders
    name: 耗材订单数
    description: 耗材类 SKU 订单量
    domain: consumables
    sql_template: |
      SELECT
        DATE(paid_at) AS date,
        sku,
        channel,
        COUNT(DISTINCT order_id) AS consumable_orders
      FROM `orders`
      WHERE status = 'paid'
        AND sku_category = 'consumable'
        AND DATE(paid_at) BETWEEN @start_date AND @end_date
      GROUP BY date, sku, channel
      ORDER BY date
    dimensions:
      - sku
      - channel
    filters:
      date_range:
        required: true
      sku:
        required: false
      channel:
        required: false
    chart_type: bar
    unit: 单
    default_aggregation: total
    aggregations:
      - type: daily
        description: 每日耗材订单数
      - type: total
        description: 时间范围内耗材订单总数
      - type: average
        description: 日均耗材订单数
    anomaly_threshold:
      warning: 10
      critical: 20
    related_metrics:
      - consumable_gmv
      - repurchase_rate
    validations:
      - rule: value_gte
        min: 0
      - rule: change_percent_range
        max_abs: 200
    example_question: 这周耗材订单有多少？

  - id: repurchase_rate
    name: 复购率
    description: 买过硬件的用户中，又买了耗材的比例
    domain: consumables
    sql_template: |
      WITH hardware_buyers AS (
        SELECT DISTINCT user_id
        FROM `orders`
        WHERE status = 'paid'
          AND sku_category = 'hardware'
          AND DATE(paid_at) BETWEEN @start_date AND @end_date
      ),
      consumable_buyers AS (
        SELECT DISTINCT user_id
        FROM `orders`
        WHERE status = 'paid'
          AND sku_category = 'consumable'
          AND DATE(paid_at) BETWEEN @start_date AND @end_date
      )
      SELECT
        SAFE_DIVIDE(
          (SELECT COUNT(*) FROM consumable_buyers cb JOIN hardware_buyers hb ON cb.user_id = hb.user_id),
          (SELECT COUNT(*) FROM hardware_buyers)
        ) * 100 AS repurchase_rate
    dimensions: []
    filters:
      date_range:
        required: true
    chart_type: bar
    unit: "%"
    default_aggregation: total
    aggregations:
      - type: total
        description: 时间范围内整体复购率（比率）
    anomaly_threshold:
      warning: 5
      critical: 10
    related_metrics:
      - consumable_gmv
      - consumable_orders
    validations:
      - rule: value_gte
        min: 0
      - rule: ratio_range
        min: 0
        max: 100
      - rule: change_percent_range
        max_abs: 200
    example_question: 硬件用户的耗材复购率是多少？

# ============================================================
# 指标关联 (Correlations)
# ============================================================

correlations:
  - group: [gmv, refund_rate, channel_sales]
    description: "销售额与退款率、渠道销售额关联"
  - group: [new_users, dau, device_bindings]
    description: "新增用户与日活、设备绑定关联"
  - group: [consumable_gmv, repurchase_rate, consumable_orders]
    description: "耗材销售与复购率、耗材订单关联"
  - group: [gmv, new_users, active_devices]
    description: "整体销售与用户增长、设备活跃关联"
  - group: [refund_rate, refund_amount]
    description: "退款率与退款金额关联"
